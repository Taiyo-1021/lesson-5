<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voiced Consonants — English Pronunciation Lesson</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a0011;overflow:hidden;height:100vh;width:100vw}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}
#progress{position:fixed;top:0;left:0;height:5px;background:linear-gradient(90deg,#f06292,#ce93d8);z-index:99;transition:width .3s ease;border-radius:0 3px 3px 0}
#slides{flex:1;position:relative;overflow:hidden;min-height:0}
.slide{position:absolute;inset:0;display:none;flex-direction:column}
.slide.active{display:flex}

/* NAV */
#nav{height:48px;background:#0a0009;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08)}
#nav button{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:13px;padding:6px 20px;border-radius:20px;cursor:pointer;transition:background .2s;font-family:inherit;letter-spacing:.3px}
#nav button:hover{background:rgba(255,255,255,.22)}
#nav button:disabled{opacity:.25;cursor:default}
#counter{color:rgba(255,255,255,.45);font-size:12px;min-width:60px;text-align:center}

/* SHARED */
.s-head{padding:12px 30px;font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0;letter-spacing:.2px}
.badge{background:rgba(255,255,255,.16);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600}
.s-body{flex:1;display:flex;padding:0 26px 12px;gap:22px;min-height:0;overflow:hidden}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.5;margin-bottom:6px}

/* ── TITLE ── */
.title-slide{background:linear-gradient(140deg,#1f0019 0%,#3d0030 55%,#1f0019 100%);align-items:center;justify-content:center;text-align:center}
.title-slide h1{font-size:clamp(40px,7.5vw,88px);font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.title-slide h1 em{font-style:normal;background:linear-gradient(90deg,#f06292,#ce93d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-sub{font-size:clamp(14px,1.9vw,21px);color:rgba(255,255,255,.6);margin-top:12px}
.goal-box{margin-top:24px;background:rgba(240,98,146,.09);border:1.5px solid rgba(240,98,146,.28);border-radius:16px;padding:16px 28px;display:inline-block;text-align:left}
.goal-box p{color:#f8bbd0;font-size:clamp(13px,1.5vw,17px);line-height:1.75}
.sym-strip{display:flex;gap:10px;margin-top:26px;justify-content:center;flex-wrap:wrap}
.sym-strip .sc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 15px;font-size:clamp(16px,2.6vw,28px);color:#f06292;font-weight:800}

/* ── OVERVIEW ── */
.ov-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;width:100%;max-width:1120px}
.ov-card{border-radius:13px;padding:11px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.09);transition:transform .18s}
.ov-card:hover{transform:translateY(-3px)}
.ov-sym{font-size:clamp(20px,3.2vw,42px);font-weight:900;line-height:1}
.ov-disp{font-size:clamp(9px,1vw,13px);font-weight:700;opacity:.7}
.ov-name{font-size:clamp(7px,.85vw,10px);opacity:.55;line-height:1.3;text-align:center}
.ov-word{font-size:clamp(9px,1vw,12px);font-style:italic;font-weight:600}

/* ── FEATURE BOX ── */
.feat-box{background:#fdeef3;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:14px;border:1.5px solid #f0629230;flex-wrap:wrap}
.feat-item{text-align:center;min-width:80px}
.feat-item .fv{font-size:clamp(12px,1.4vw,16px);font-weight:800}
.feat-item .fl{font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-top:2px}
.feat-throat{font-size:clamp(10px,1.15vw,13px);color:#555;line-height:1.55;flex:1;min-width:160px}
.feat-throat strong{color:#ad1457}

/* ── EXPLAIN ── */
.explain-slide{background:#fff;flex-direction:column}
.ex-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;width:240px;flex-shrink:0;padding:4px 0}
.big-sym{font-size:clamp(68px,11vw,128px);font-weight:900;line-height:1;text-align:center}
.mouth-wrap{background:#f9f9f9;border-radius:13px;padding:7px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.lip-lbl{font-size:10px;color:#888;text-align:center;line-height:1.6}
.ex-right{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;padding:4px 0;min-height:0;gap:7px}
.desc-card{border-radius:12px;padding:11px 15px}
.desc-card p{font-size:clamp(12px,1.4vw,15px);line-height:1.55;color:#1a2a3a;font-weight:500}
.howto{list-style:none;margin-top:5px;display:flex;flex-direction:column;gap:3px}
.howto li{font-size:clamp(11px,1.25vw,13px);padding-left:16px;position:relative;color:#2a3a4a;line-height:1.4}
.howto li::before{content:'→';position:absolute;left:0;opacity:.4;font-size:11px}
.tip-box{border-radius:12px;padding:11px 15px;display:flex;gap:9px;align-items:flex-start;background:#fce4ec;border-left:4px solid #ad1457}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.tip-text{font-size:clamp(11px,1.3vw,14px);line-height:1.5;font-weight:500;color:#5f0030}
.ex-words{display:flex;gap:7px;flex-wrap:wrap}
.ex-chip{border-radius:10px;padding:8px 11px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:66px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.ex-chip .ew{font-size:clamp(13px,1.8vw,19px);font-weight:700}
.ex-chip .ei{font-size:clamp(9px,.95vw,11px);opacity:.55}
.ctx{border-radius:9px;padding:8px 13px;font-size:clamp(10px,1.1vw,12px);color:#555}

/* ── DRILL ── */
.drill-slide{background:#fdeef3;flex-direction:column}
.dr-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;width:200px;flex-shrink:0}
.dr-sym{font-size:clamp(58px,9.5vw,108px);font-weight:900;line-height:1;text-align:center}
.dr-right{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:2px 0;min-height:0}
.repeat-instr{border-radius:12px;padding:11px 16px;margin-bottom:10px}
.repeat-instr .ri-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.repeat-instr .ri-flow{display:flex;align-items:center;gap:10px;font-size:clamp(13px,1.6vw,17px);font-weight:600;flex-wrap:wrap}
.ri-step{border-radius:8px;padding:5px 12px;white-space:nowrap}
.ri-arrow{font-size:18px;opacity:.35}
.word-rows{display:flex;flex-direction:column;gap:8px}
.wr{display:flex;align-items:center;gap:12px;background:#fff;border-radius:11px;padding:10px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.wr-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.wr-w{font-size:clamp(16px,2.5vw,28px);font-weight:700;flex:1}
.wr-p{font-size:clamp(10px,1.2vw,14px);opacity:.45}
.mp-box{border-radius:12px;padding:12px 16px}
.mp-box .label{margin-bottom:8px}
.mp-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mp-item{text-align:center}
.mp-sym{font-size:clamp(11px,1.2vw,14px);font-weight:700;opacity:.6;margin-bottom:2px}
.mp-word{font-size:clamp(17px,2.7vw,30px);font-weight:800}
.mp-vs{font-size:16px;opacity:.25;font-weight:900}
.mp-note{font-size:clamp(11px,1.2vw,14px);color:#555;align-self:center;max-width:220px;line-height:1.5}

/* ── STUDENT DRILL ── */
.stdrill-slide{background:#fdeef3;flex-direction:column}
.sd-instr{background:#fff;border-radius:13px;padding:13px 18px;border-left:5px solid #ad1457;flex-shrink:0}
.sd-instr h2{font-size:clamp(14px,1.7vw,19px);color:#5f0030;margin-bottom:7px}
.flow-steps{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.fs{display:flex;align-items:flex-start;gap:7px;font-size:clamp(11px,1.25vw,14px);line-height:1.45;flex:1;min-width:160px}
.fs-n{background:#ad1457;color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.word-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:10px}
.wg{background:#fff;border-radius:12px;padding:13px 7px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.wg-w{font-size:clamp(18px,2.8vw,34px);font-weight:800}
.wg-sym{font-size:clamp(10px,1.1vw,13px);font-weight:600;margin-top:3px}

/* ── FEEDBACK ── */
.fb-slide{background:#fdeef3;flex-direction:column}
.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.fb-card{background:#fff;border-radius:13px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.fb-card h3{font-size:clamp(12px,1.4vw,15px);font-weight:700;margin-bottom:10px}
.fb-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.fb-list li{font-size:clamp(11px,1.25vw,14px);line-height:1.45;padding-left:16px;position:relative;color:#2a2a3a}
.fb-list li::before{content:'•';position:absolute;left:0;font-weight:700}
.fb-pair{display:inline-block;background:#fce4ec;border-radius:6px;padding:2px 8px;font-weight:700;font-size:.95em;margin:0 2px}

/* ── QUIZ Q ── */
.quizq-slide{background:#fffbf2;flex-direction:column}
.q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 16px;width:100%}
.q-box{background:#fff;border-radius:13px;padding:15px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.q-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.4;margin-bottom:5px}
.q-text{font-size:clamp(13px,1.6vw,18px);font-weight:600;margin-bottom:11px;line-height:1.4;color:#1a1a2e}
.q-opts{display:flex;gap:8px;flex-wrap:wrap}
.q-opt{border-radius:8px;padding:7px 16px;font-size:clamp(12px,1.5vw,16px);font-weight:700;border:2px solid #ddd;background:#f7f7f7;color:#333;cursor:default}
.think-banner{background:rgba(173,20,87,.08);border:1.5px solid rgba(173,20,87,.25);border-radius:12px;padding:12px 20px;text-align:center;font-size:clamp(13px,1.5vw,17px);color:#5f0030;font-weight:600;flex-shrink:0}

/* ── QUIZ A ── */
.quiza-slide{background:#f0fff4;flex-direction:column}
.qa-box{background:#fff;border-radius:13px;padding:15px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.qa-opt{border-radius:8px;padding:7px 16px;font-size:clamp(12px,1.5vw,16px);font-weight:700;border:2px solid #ddd;background:#f7f7f7;color:#999;cursor:default}
.qa-opt.correct{background:#e8f5e9;border-color:#2e7d52;color:#1a5c35}
.qa-opt.correct::after{content:' ✓';font-weight:900}
.qa-hint{font-size:clamp(10px,1.15vw,13px);color:#2e7d52;margin-top:7px;font-weight:500;line-height:1.5}

/* ── SUMMARY ── */
.summary-slide{background:linear-gradient(140deg,#1f0019 0%,#3d0030 100%);flex-direction:column}
.sum-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;padding:10px 24px;width:100%}
.sum-card{border-radius:13px;padding:11px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 3px 12px rgba(0,0,0,.22);transition:transform .18s}
.sum-card:hover{transform:translateY(-3px)}
.sc-sym{font-size:clamp(20px,3.2vw,40px);font-weight:900;color:#fff}
.sc-disp{font-size:clamp(9px,1vw,12px);color:rgba(255,255,255,.5);font-weight:600}
.sc-ws{font-size:clamp(8px,.9vw,11px);color:rgba(255,255,255,.38);font-style:italic;line-height:1.6}
.sum-foot{text-align:center;color:rgba(255,255,255,.6);font-size:clamp(12px,1.35vw,16px);padding:8px 26px 4px}
.sum-foot strong{color:#f06292}
.nxt-box{background:rgba(255,255,255,.06);border-radius:12px;padding:11px 22px;margin-top:10px;display:inline-block}
.nxt-box p{color:rgba(255,255,255,.5);font-size:clamp(11px,1.2vw,14px);line-height:1.6}
.nxt-box strong{color:#ce93d8}

/* ── FREE CONVERSATION ── */
.freeconv-slide{background:linear-gradient(140deg,#1a1200 0%,#2d2000 55%,#1a1200 100%);flex-direction:column}
.fc-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:0 36px 16px;text-align:center}
.fc-badge{background:rgba(255,200,50,.15);border:1.5px solid rgba(255,200,50,.4);border-radius:20px;padding:5px 16px;font-size:clamp(10px,1.1vw,13px);font-weight:700;color:#ffd740;letter-spacing:1.5px;text-transform:uppercase}
.fc-topic{font-size:clamp(28px,5.5vw,68px);font-weight:900;color:#fff;line-height:1.1;max-width:800px}
.fc-questions{display:flex;flex-direction:column;gap:9px;margin-top:4px;width:100%;max-width:600px}
.fc-q{background:rgba(255,255,255,.07);border-radius:12px;padding:12px 20px;font-size:clamp(13px,1.6vw,18px);color:rgba(255,255,255,.85);font-weight:500;text-align:left;border-left:4px solid #ffd740}
.fc-note{font-size:clamp(10px,1.1vw,13px);color:rgba(255,255,255,.35);margin-top:4px;line-height:1.6}
.fc-teacher{background:rgba(255,200,50,.08);border:1px solid rgba(255,200,50,.2);border-radius:12px;padding:10px 20px;font-size:clamp(10px,1.15vw,13px);color:rgba(255,200,50,.7);width:100%;max-width:600px;text-align:left;line-height:1.7}
.fc-teacher strong{color:#ffd740}
</style>
</head>
<body>
<div id="app">
  <div id="progress"></div>
  <div id="slides"></div>
  <nav id="nav">
    <button id="btn-prev" onclick="move(-1)">◀ Prev</button>
    <span id="counter"></span>
    <button id="btn-next" onclick="move(1)">Next ▶</button>
    <button onclick="toggleFS()">⛶ Fullscreen</button>
  </nav>
</div>

// ═══════════════════════════════════════════
//  MOUTH SVG
// ═══════════════════════════════════════════
function mSVG(m,w=188,h=120){
  const cx=w/2,fCy=h*.52,mCy=h*.60;
  const hW=(w*.13)+(w*.38-w*.13)*m.lipWidth;
  const op=m.lipOpenness*h*.30;
  const uY=mCy-op/2,lY=mCy+op/2,lx=cx-hW,rx=cx+hW;
  let uP;
  if(m.rounded){uP=`M ${lx},${uY} Q ${cx},${uY-hW*.12} ${rx},${uY}`;}
  else{const bH=hW*.20,dH=hW*.08;uP=`M ${lx},${uY} C ${lx+hW*.28},${uY-bH} ${cx-hW*.14},${uY-dH} ${cx},${uY-dH*.4} C ${cx+hW*.14},${uY-dH} ${rx-hW*.28},${uY-bH} ${rx},${uY}`;}
  const lC2=hW*.26,lP=`M ${lx},${lY} Q ${cx},${lY+lC2} ${rx},${lY}`;
  const fP=`${uP} L ${rx},${lY} Q ${cx},${lY+lC2} ${lx},${lY} Z`,LC='#C05060';
  let th='',tg='';
  if(m.lipOpenness>=.13){const t=op*.85;th=`<rect x="${lx+2}" y="${uY+1}" width="${hW*2-4}" height="${t}" rx="3" fill="white" opacity=".95"/><line x1="${lx+2}" y1="${uY+t*.45}" x2="${rx-2}" y2="${uY+t*.45}" stroke="#ddd" stroke-width=".5"/>`;}
  if(m.lipOpenness>.28){const tW=Math.min(hW*1.4,hW*2-6),tY=lY-op*(.18+m.tongueHeight*.18),tRy=op*.28;tg=`<ellipse cx="${cx}" cy="${tY}" rx="${tW/2}" ry="${tRy}" fill="#E08080" opacity=".82"/>`;}
  const nCy=mCy-h*.25;
  const ns=`<ellipse cx="${cx-5}" cy="${nCy}" rx="3.5" ry="2.5" fill="#E0AA80" opacity=".55"/><ellipse cx="${cx+5}" cy="${nCy}" rx="3.5" ry="2.5" fill="#E0AA80" opacity=".55"/><path d="M ${cx-5},${nCy-1} Q ${cx},${nCy-6} ${cx+5},${nCy-1}" fill="none" stroke="#E0AA80" stroke-width="1.4" opacity=".35"/>`;
  const co=m.lipOpenness>.02?`<line x1="${lx}" y1="${uY}" x2="${lx}" y2="${lY}" stroke="${LC}" stroke-width="2" stroke-linecap="round"/><line x1="${rx}" y1="${uY}" x2="${rx}" y2="${lY}" stroke="${LC}" stroke-width="2" stroke-linecap="round"/>`:'';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><ellipse cx="${cx}" cy="${fCy}" rx="${w*.44}" ry="${h*.44}" fill="#FFE4C4" stroke="#F4C89E" stroke-width="2"/>${ns}${th}${tg}<path d="${fP}" fill="${LC}" opacity="${m.lipOpenness<.05?.28:.13}"/>${co}<path d="${uP}" fill="none" stroke="${LC}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="${lP}" fill="none" stroke="${LC}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

    </div>`).join('');
  return `<div class="slide quiza-slide">
  <div class="s-head" style="background:#1e5f3a">Mini Quiz — Answers <span class="badge" style="background:rgba(255,255,255,.14)">How did you do?</span></div>
  <div class="s-body" style="flex-direction:column;justify-content:space-evenly;gap:10px">
    <div class="q-grid">${qs}</div>
  </div></div>`;
}

function summaryHTML(){
  return `<div class="slide summary-slide">
  <div class="s-head" style="background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.09)">
    <span style="color:#fff">Summary — Voiced Consonants（有声子音）</span>
    <span class="badge" style="background:rgba(255,255,255,.1);color:#ce93d8">Lesson Complete 🎉</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <p style="color:rgba(255,255,255,.5);font-size:clamp(12px,1.35vw,16px);margin-bottom:14px">All 8 voiced consonants — air + voice, buzzing throat!</p>
    <div class="sum-grid">${PH.map(p=>`
      <div class="sum-card" style="background:${p.color}">
        <div class="sc-sym">${p.sym}</div>
        <div class="sc-disp">${p.disp}</div>
        <div class="sc-ws">${p.ex.slice(0,3).map(e=>e.w).join(' · ')}</div>
      </div>`).join('')}</div>
    <div class="sum-foot">
      <p>Key rule: <strong>Voiced = AIR + VOICE</strong> — your throat should buzz the whole time! 🐝</p>
      <div class="nxt-box">
        <p>Next lesson: <strong>Nasal & Approximant Consonants（鼻音・接近音）</strong> — /m/ /n/ /ŋ/ /l/ /r/ /w/ /j/</p>
        <p style="margin-top:3px">A full review quiz across all 6 lessons will wrap up the course!</p>
      </div>
    </div>
  </div></div>`;
}

function freeConvHTML(){
  return `<div class="slide freeconv-slide">
  <div class="s-head" style="background:#2d1f00;border-top:2px solid rgba(255,200,50,.25)">
    <span style="color:#ffd740">💬 Free Conversation</span>
    <span class="badge" style="background:rgba(255,200,50,.18);color:#ffd740">1–3 min each</span>
  </div>
  <div class="fc-body">
    <div class="fc-badge">Today's Topic</div>
    <div class="fc-topic">Time Travel — Past or Future?</div>
    <div class="fc-questions">
      <div class="fc-q">⏳ If you could travel to any time period, when would you go?</div>
      <div class="fc-q">🌍 What would you do there first?</div>
      <div class="fc-q">🔮 Would you want to know your own future? Why or why not?</div>
    </div>
    <p class="fc-note">The topic doesn't need to relate to today's pronunciation theme — just have a natural conversation!</p>
    <div class="fc-teacher">
      <strong>Teacher guide:</strong> Talk with each student individually for 1–3 minutes.<br>
      Correct pronunciation naturally — don't interrupt the conversation flow.<br>
      Use follow-up questions to keep the conversation going.
    </div>
  </div></div>`;
}

// ═══════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════
function build(){
  const c=document.getElementById('slides');
  let h=titleHTML()+overviewHTML();
  PH.forEach((p,i)=>{h+=explainHTML(p,i+1);h+=drillHTML(p,i+1);});
  h+=stdDrillHTML()+feedbackHTML()+quizQHTML()+quizAHTML()+summaryHTML()+freeConvHTML();
  c.innerHTML=h;
}

let cur=0,SL=[];
function updateUI(){
  SL.forEach((s,i)=>s.classList.toggle('active',i===cur));
  document.getElementById('counter').textContent=`${cur+1} / ${SL.length}`;
  document.getElementById('progress').style.width=`${(cur+1)/SL.length*100}%`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===SL.length-1;
}
function move(d){const n=Math.max(0,Math.min(SL.length-1,cur+d));if(n!==cur){cur=n;updateUI();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')move(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')move(-1);
});
function toggleFS(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
build();
SL=Array.from(document.querySelectorAll('.slide'));
updateUI();
</script>
</body>
</html>
